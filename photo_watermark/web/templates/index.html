<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>水印拍照解码</title>
<style>
  :root { --bg:#0f1220; --card:#191d31; --fg:#e8ebf5; --mut:#9aa3bd; --acc:#5b8cff; --ok:#2fbf71; --err:#ff5d6c; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--fg); }
  .wrap { max-width:560px; margin:0 auto; padding:16px; }
  h1 { font-size:20px; margin:8px 0 16px; }
  .card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:14px; }
  video, #preview { width:100%; border-radius:10px; background:#000; display:block; }
  #preview { display:none; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .row > * { flex:1; }
  button { border:0; border-radius:10px; padding:12px; font-size:15px; font-weight:600;
           color:#fff; background:var(--acc); cursor:pointer; }
  button.ghost { background:#2a3050; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  label { font-size:13px; color:var(--mut); display:block; margin-bottom:4px; }
  input, select { width:100%; padding:9px; border-radius:8px; border:1px solid #333a5c;
                  background:#0f1324; color:var(--fg); font-size:14px; }
  .field { flex:1; }
  .hint { font-size:12px; color:var(--mut); margin-top:8px; line-height:1.5; }
  #result { display:none; }
  .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
  .badge.ok { background:rgba(47,191,113,.15); color:var(--ok); }
  .badge.err { background:rgba(255,93,108,.15); color:var(--err); }
  .text { font-size:22px; font-weight:700; letter-spacing:2px; margin:10px 0; word-break:break-all; }
  .spin { display:inline-block; width:16px; height:16px; border:2px solid #fff;
          border-top-color:transparent; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-3px; }
  @keyframes sp { to { transform:rotate(360deg); } }
  img.prev { width:100%; border-radius:10px; margin-top:10px; }
  .muted { color:var(--mut); font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📷 水印拍照解码</h1>

  <div class="card">
    <video id="cam" autoplay playsinline muted></video>
    <img id="preview" alt="预览">
    <div style="height:12px"></div>
    <div class="row">
      <button id="btnCam" class="ghost">开启相机</button>
      <button id="btnShot" disabled>拍照</button>
    </div>
    <div style="height:10px"></div>
    <div class="row">
      <button id="btnPick" class="ghost">从相册/文件选择</button>
    </div>
    <input id="file" type="file" accept="image/*" capture="environment" style="display:none">
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>BLOCK_SIZE</label>
        <select id="blockSize">
          <option value="8">8</option>
          <option value="12">12</option>
          <option value="16">16</option>
        </select>
      </div>
      <div class="field">
        <label>冗余份数 repl</label>
        <input id="repl" type="number" min="1" value="__REPL__">
      </div>
      <div class="field">
        <label>矫正</label>
        <select id="align">
          <option value="1">开启（拍照推荐）</option>
          <option value="0">关闭</option>
        </select>
      </div>
    </div>
    <div style="height:12px"></div>
    <button id="btnDecode" disabled>解码</button>
    <div class="hint" id="tplHint"></div>
  </div>

  <div class="card" id="result">
    <span class="badge" id="badge"></span>
    <div class="text" id="wmText"></div>
    <div class="muted" id="meta"></div>
    <img class="prev" id="alignedImg" style="display:none" alt="矫正结果">
  </div>
</div>

<script>
const HAS_TEMPLATE = __HAS_TEMPLATE__;
const DEFAULT_BS = "__BLOCK_SIZE__";
document.getElementById('blockSize').value = DEFAULT_BS;
document.getElementById('tplHint').textContent = HAS_TEMPLATE
  ? '服务端已配置矫正模板：直接解码失败时将自动矫正后重试。'
  : '服务端未配置模板：仅能直接解码，无法矫正（用 --template 启动可开启）。';

let capturedBlob = null;
const cam = document.getElementById('cam');
const preview = document.getElementById('preview');
const btnCam = document.getElementById('btnCam');
const btnShot = document.getElementById('btnShot');
const btnPick = document.getElementById('btnPick');
const btnDecode = document.getElementById('btnDecode');
const fileInput = document.getElementById('file');
let stream = null;

const camSupported = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
if (!camSupported) {
  btnCam.disabled = true;
  btnShot.disabled = true;
  btnCam.textContent = '相机不可用';
  document.getElementById('tplHint').insertAdjacentHTML('beforeend',
    '<br><span style="color:var(--err)">当前为非安全上下文（HTTP + 非 localhost），浏览器禁用了实时相机。' +
    '请点“从相册/文件选择”（手机会直接调起相机），或用 HTTPS / localhost 访问。</span>');
}

btnCam.onclick = async () => {
  if (!camSupported) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false });
    cam.srcObject = stream;
    cam.style.display = 'block';
    preview.style.display = 'none';
    btnShot.disabled = false;
  } catch (e) {
    alert('无法开启相机：' + e.message + '\n请改用“从相册/文件选择”，或用 HTTPS / localhost 访问。');
  }
};

btnShot.onclick = () => {
  const c = document.createElement('canvas');
  c.width = cam.videoWidth; c.height = cam.videoHeight;
  c.getContext('2d').drawImage(cam, 0, 0);
  c.toBlob(b => { setCaptured(b); }, 'image/png');
};

btnPick.onclick = () => fileInput.click();
fileInput.onchange = () => { if (fileInput.files[0]) setCaptured(fileInput.files[0]); };

function setCaptured(blob) {
  capturedBlob = blob;
  const url = URL.createObjectURL(blob);
  preview.src = url;
  preview.style.display = 'block';
  cam.style.display = 'none';
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; btnShot.disabled = true; }
  btnDecode.disabled = false;
}

btnDecode.onclick = async () => {
  if (!capturedBlob) return;
  btnDecode.disabled = true;
  btnDecode.innerHTML = '<span class="spin"></span> 解码中…';
  const fd = new FormData();
  fd.append('image', capturedBlob, 'photo.png');
  fd.append('block_size', document.getElementById('blockSize').value);
  fd.append('repl', document.getElementById('repl').value);
  fd.append('align', document.getElementById('align').value);
  try {
    const res = await fetch('/api/decode', { method: 'POST', body: fd });
    const data = await res.json();
    showResult(data);
  } catch (e) {
    showResult({ ok: false, error: e.message });
  } finally {
    btnDecode.disabled = false;
    btnDecode.textContent = '解码';
  }
};

function showResult(d) {
  const box = document.getElementById('result');
  const badge = document.getElementById('badge');
  const wm = document.getElementById('wmText');
  const meta = document.getElementById('meta');
  const aimg = document.getElementById('alignedImg');
  box.style.display = 'block';
  if (d.ok) {
    badge.className = 'badge ok'; badge.textContent = '解码成功';
    wm.textContent = d.text;
    meta.textContent = '方式：' + (d.method === 'aligned' ? '矫正后解码' : '直接解码');
  } else {
    badge.className = 'badge err'; badge.textContent = '解码失败';
    wm.textContent = '—';
    meta.textContent = d.reason || d.error || (d.method === 'aligned' ? '矫正后仍失败' : '');
  }
  if (d.preview) { aimg.src = d.preview; aimg.style.display = 'block'; }
  else { aimg.style.display = 'none'; }
}
</script>
</body>
</html>
